<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Agregar Artículo</title>

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/styleAgregar.css">
</head>

<body>

<div class="container">

<div class="cardFormulario">

<h1>Registrar Artículo</h1>

<form id="formArticulo">

<div class="grupo">

<label>Nombre</label>

<input type="text"
       id="nombre"
       required>

</div>

<div class="grupo">

<label>Cantidad Comprada</label>

<input type="number"
       id="cantidadComprada"
       required>

</div>

<div class="grupo">

<label>Precio Mayorista</label>

<input type="number"
       step="0.01"
       id="precioMayorista"
       required>

</div>

<div class="grupo">

<label>Cantidad Vendida</label>

<input type="number"
       id="cantidadVendida"
       required>

</div>

<div class="grupo">

<label>Precio Venta</label>

<input type="number"
       step="0.01"
       id="precioVenta"
       required>

</div>

<div class="botones">

<a href="listarArticulos.html"
   class="btnVolver">

⬅ Volver

</a>

<button type="submit"
        class="btnGuardar">

Guardar Artículo

</button>

</div>

</form>

</div>

</div>

<script type="module"
        src="js/firebase-config.js"></script>

<script type="module"
        src="js/articulos.js"></script>

</body>

</html>
