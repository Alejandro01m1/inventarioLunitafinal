<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/styleFinanzas.css">
</head>

<body>

<div class="container">

    <div class="topFinanzas">
        <h1>Finanzas</h1>
        <a href="menu.html" class="btnVolver">⬅ Volver</a>
    </div>

    <div class="formFinanzas">
        <h2 style="margin-bottom:20px;">Registrar Información Financiera</h2>
        
        <form id="formFinanzas">
            <div class="grupo">
                <label>Dinero que deben (Deuda actual)</label>
                <input type="number" id="dineroDeben" placeholder="Ej: 50000" required>
            </div>
            <div class="grupo">
                <label>Gastos de envío acumulados</label>
                <input type="number" id="envio" placeholder="Ej: 10000" required>
            </div>
            <button type="submit" class="btnGuardar">Guardar Registro</button>
        </form>
    </div>

    <div class="finanzasGrid">
        <div class="finanzaCard">
            <div class="finanzaTitulo">💰 Total Vendido</div>
            <div class="finanzaValor" id="totalVendido">$0</div>
        </div>
        <div class="finanzaCard">
            <div class="finanzaTitulo">🏦 Total Invertido</div>
            <div class="finanzaValor" id="totalInvertido">$0</div>
        </div>
        <div class="finanzaCard">
            <div class="finanzaTitulo">🚚 Gastos Envío</div>
            <div class="finanzaValor" id="gastosEnvio">$0</div>
        </div>
        <div class="finanzaCard">
            <div class="finanzaTitulo">⏳ Dinero Pendiente</div>
            <div class="finanzaValor" id="totalDeben">$0</div>
        </div>
        <div class="finanzaCard realCard">
            <div class="finanzaTitulo">📈 Dinero Real en Bolsillo</div>
            <div class="finanzaValor" id="dineroReal">$0</div>
        </div>
    </div>

</div>

<script type="module" src="js/finanzas.js"></script>
</body>
</html>
